<!doctype html>
<html lang="zh-CN" data-theme="supabase">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="UIChat Mira 多模型本地智能体产品文档" />
  <link rel="icon" type="image/png" href="/mira-logo.png" />
  <title>UIChat Mira · 本地优先的多模型智能体</title>

    try {
      const theme = localStorage.getItem("mira-color-theme");
      if (["claude", "apple", "supabase"].includes(theme)) {
        document.documentElement.dataset.theme = theme;
      }
    } catch {}
  </script>
</head>

  <div id="root"></div>

</body>
