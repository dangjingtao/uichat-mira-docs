name: Submit URLs to Baidu

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: baidu-url-submit
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production sitemap
        run: pnpm run build

      - name: Build changed URL list
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          BASE_SHA="$BEFORE_SHA"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD^ 2>/dev/null || true)
          fi

          if [ -n "$BASE_SHA" ]; then
            git diff --name-only "$BASE_SHA" "$GITHUB_SHA" > /tmp/changed-files.txt
          else
            git show --pretty='' --name-only "$GITHUB_SHA" > /tmp/changed-files.txt
          fi

          node <<'NODE'
          const fs = require('fs');

          const changed = fs.readFileSync('/tmp/changed-files.txt', 'utf8')
            .split(/\r?\n/)
            .map((line) => line.trim())
            .filter(Boolean);
          const sitemap = fs.readFileSync('dist/sitemap.xml', 'utf8');
          const sitemapUrls = [...sitemap.matchAll(/<loc>([^<]+)<\/loc>/g)].map((match) => match[1]);

          const normalizePath = (value) => {
            try {
              return decodeURI(value).replace(/\/$/, '') || '/';
            } catch {
              return value.replace(/\/$/, '') || '/';
            }
          };

          const urlsByPath = new Map(
            sitemapUrls.map((url) => {
              const parsed = new URL(url);
              return [normalizePath(parsed.pathname), url];
            }),
          );

          const candidates = new Set();
          let hasSiteWideChange = false;

          for (const file of changed) {
            if (/^src\/pages\/.+\.md$/i.test(file) && !/(^|\/)README\.md$/i.test(file)) {
              let route = file
                .replace(/^src\/pages/, '')
                .replace(/^\/docs/, '')
                .replace(/\.md$/i, '');
              if (!route) route = '/';
              candidates.add(normalizePath(route));
              continue;
            }

            if (
              file === 'index.html' ||
              file === 'src/site.config.ts' ||
              /^src\/(components\/|.*\.(tsx?|css)$)/.test(file)
            ) {
              hasSiteWideChange = true;
            }
          }

          if (hasSiteWideChange) candidates.add('/');

          const urls = [...new Set(
            [...candidates]
              .map((path) => urlsByPath.get(path))
              .filter(Boolean),
          )];

          fs.writeFileSync('urls.txt', urls.length ? `${urls.join('\n')}\n` : '');

          console.log(`Changed files: ${changed.length}`);
          console.log(`URLs selected for Baidu: ${urls.length}`);
          if (urls.length) console.log(urls.join('\n'));
          NODE

      - name: Submit changed URLs to Baidu
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          if [ -z "$BAIDU_PUSH_TOKEN" ]; then
            echo "BAIDU_PUSH_TOKEN is not configured; skipping Baidu submission."
            exit 0
          fi

          if [ ! -s urls.txt ]; then
            echo "No changed public URLs to submit; skipping."
            exit 0
          fi

          echo "Submitting $(wc -l < urls.txt) changed URL(s) to Baidu..."

          HTTP_STATUS=$(curl --silent --show-error \
            -o baidu-response.json \
            -w '%{http_code}' \
            -H 'Content-Type:text/plain' \
            --data-binary @urls.txt \
            "http://data.zz.baidu.com/urls?site=https://tomz.io&token=${BAIDU_PUSH_TOKEN}")

          echo "Baidu HTTP status: $HTTP_STATUS"
          echo "Baidu response:"
          cat baidu-response.json
          echo

          if grep -qi 'over quota' baidu-response.json; then
            echo "::warning::Baidu daily URL submission quota is exhausted; skipping without failing the workflow."
            exit 0
          fi

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            exit 0
          fi

          echo "::error::Baidu URL submission failed with HTTP $HTTP_STATUS"
          exit 1
