name: Submit URLs to Baidu

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: baidu-url-submit
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production sitemap
        run: pnpm run build

      - name: Submit sitemap URLs to Baidu
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
        run: |
          if [ -z "$BAIDU_PUSH_TOKEN" ]; then
            echo "BAIDU_PUSH_TOKEN is not configured; skipping Baidu submission."
            exit 0
          fi

          grep -oE '<loc>[^<]+</loc>' dist/sitemap.xml \
            | sed -E 's#</?loc>##g' \
            | grep '^https://tomz\.io' \
            > urls.txt

          if [ ! -s urls.txt ]; then
            echo "No tomz.io URLs found in dist/sitemap.xml"
            exit 1
          fi

          echo "Submitting $(wc -l < urls.txt) URLs to Baidu..."
          echo "First URLs:"
          head -n 5 urls.txt

          HTTP_CODE=$(curl -sS -o baidu-response.json -w '%{http_code}' \
            -H 'Content-Type:text/plain' \
            --data-binary @urls.txt \
            "http://data.zz.baidu.com/urls?site=https://tomz.io&token=${BAIDU_PUSH_TOKEN}")

          echo "Baidu HTTP status: $HTTP_CODE"
          echo "Baidu response:"
          cat baidu-response.json
          echo

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
